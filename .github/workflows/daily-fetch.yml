name: Daily Fetch & Deploy

on:
  schedule:
    - cron: '0 0 * * *' # UTC 00:00 = KST 09:00 (primary)
    - cron: '0 6 * * *' # UTC 06:00 = KST 15:00 (backup — GH cron often delays/skips)
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: daily-fetch
  cancel-in-progress: false

jobs:
  fetch-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 2026-07-04: 번역기를 Max 구독 CLI로 전환. Node + claude CLI 설치 후
      # CLAUDE_CODE_OAUTH_TOKEN(Max 구독 토큰, `claude setup-token`으로 발급)으로 인증.
      - name: Set up Node (Claude CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Pinned to exact current-latest versions (checked via `npm view <pkg> version`)
      # for reproducible installs; cache the npm download cache so re-runs of
      # this workflow skip re-downloading the same pinned tarballs.
      - name: Cache npm global package downloads
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-global-claude-code-2.1.216-railway-cli-5.27.1

      - name: Install Claude CLI (Max subscription translator)
        run: npm install -g @anthropic-ai/claude-code@2.1.216

      - name: Fetch today's digest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 주 번역기 — Max 구독 CLI ($0). 미설정 시 CLI가 비인증으로 실패 → 아래 유료 키로 폴백.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # 폴백 (유료) — CLAUDE_CODE_OAUTH_TOKEN 미설정/실패 시에만 사용. 시크릿 제거 시 완전 비활성.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch.py

      - name: Commit and push data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "data: daily fetch $(date -u +%Y-%m-%d)"
            # 동시 실행(cron 2개 + 수동 트리거) 경합 대비 — rebase 후 push, 최대 3회 재시도
            for attempt in 1 2 3; do
              git pull --rebase origin main && git push && break || { echo "push retry $attempt"; sleep 5; }
            done
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node (for Railway CLI)
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: npm install -g @railway/cli@5.27.1

      - name: Redeploy to Railway
        if: steps.commit.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service ${{ secrets.RAILWAY_SERVICE_ID }} --detach --ci

      - name: Check Railway usage
        id: usage
        continue-on-error: true
        env:
          RAILWAY_ACCOUNT_TOKEN: ${{ secrets.RAILWAY_ACCOUNT_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          USAGE_ALERT_USD: '2.00'
        run: python scripts/check_usage.py

      - name: Alert on cost threshold
        if: steps.usage.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create cost-alert --repo drwon-cmd/wvb-cc-radar --color d93f0b --description "Railway cost threshold exceeded" 2>/dev/null || true
          existing=$(gh issue list --repo drwon-cmd/wvb-cc-radar --label cost-alert --state open --json number --jq length)
          if [ "$existing" -eq "0" ]; then
            gh issue create \
              --repo drwon-cmd/wvb-cc-radar \
              --title "[cost-alert] Railway monthly estimate exceeded \$${USAGE_ALERT_USD:-2.00}" \
              --label cost-alert \
              --body "Railway estimated monthly cost for wvb-cc-radar crossed the threshold.

          - Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          - Railway dashboard: https://railway.com/project/50f4f05e-f8f8-44f1-aa90-1bd0496a8e4c/usage

          Review the usage table in the workflow logs for the measurement breakdown.
          Close this issue manually once addressed; new alerts are suppressed while an open cost-alert issue exists."
            echo "Created cost-alert issue"
          else
            echo "Existing cost-alert issue open (#$(gh issue list --repo drwon-cmd/wvb-cc-radar --label cost-alert --state open --json number --jq '.[0].number')), skipping"
          fi

      # 주간 이메일 다이제스트 — 월요일(KST)에만 발송. 중복 방지 마커(data/.last_weekly_email)로
      # 백업 cron(15:00 KST) 재실행 시 재발송을 막고, primary cron이 skip되면 백업이 대신 발송한다.
      # GMAIL secret 미설정이면 경고만 남기고 skip (워크플로 실패 아님).
      - name: Weekly email digest (Mondays KST)
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
        run: |
          if [ "$(TZ=Asia/Seoul date +%u)" != "1" ]; then
            echo "Not Monday (KST) — skipping weekly email"
            exit 0
          fi
          if [ -z "$GMAIL_APP_PASSWORD" ]; then
            echo "::warning::GMAIL_APP_PASSWORD secret not configured — skipping weekly email"
            exit 0
          fi
          today=$(TZ=Asia/Seoul date +%F)
          last=$(cat data/.last_weekly_email 2>/dev/null || echo none)
          if [ "$last" = "$today" ]; then
            echo "Weekly email already sent today ($today) — skipping"
            exit 0
          fi
          python scripts/weekly_email.py --send
          echo "$today" > data/.last_weekly_email
          git add data/.last_weekly_email
          git commit -m "chore: weekly email sent marker $today"
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push && break || { echo "push retry $attempt"; sleep 5; }
          done

      - name: Notify on workflow failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create fetch-failure --repo drwon-cmd/wvb-cc-radar --color b60205 --description "Daily fetch workflow run failed" 2>/dev/null || true
          existing=$(gh issue list --repo drwon-cmd/wvb-cc-radar --label fetch-failure --state open --json number --jq length)
          if [ "$existing" -eq "0" ]; then
            gh issue create \
              --repo drwon-cmd/wvb-cc-radar \
              --title "🚨 daily-fetch failed $(date -u +%Y-%m-%d)" \
              --label fetch-failure \
              --body "The daily-fetch workflow run failed.

          - Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Check the run logs for the failing step (fetch.py exit code, GitHub API errors, translation provider failures, or Railway deploy). Close this issue manually once addressed; new alerts are suppressed while an open fetch-failure issue exists."
            echo "Created fetch-failure issue"
          else
            echo "Existing fetch-failure issue open (#$(gh issue list --repo drwon-cmd/wvb-cc-radar --label fetch-failure --state open --json number --jq '.[0].number')), skipping"
          fi
